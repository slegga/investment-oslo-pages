<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oslo Børs Porteføljer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-light: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #2a2a4e;
            --mcap-color: #4cc9f0;
            --under-color: #f72585;
            --over-color: #7209b7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-weight: 600;
            font-size: 2.5rem;
        }

        .last-updated {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            border-left: 4px solid var(--border-color);
        }

        .summary-card.mcap { border-left-color: var(--mcap-color); }
        .summary-card.undervurdert { border-left-color: var(--under-color); }
        .summary-card.overvurdert { border-left-color: var(--over-color); }

        .card-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin: 0 0 0.5rem 0;
            text-transform: capitalize;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.25rem 0;
        }

        .card-change {
            font-size: 1rem;
            font-weight: 500;
        }

        .change-positive { color: #4ade80; }
        .change-negative { color: #f87171; }

        .chart-container {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            height: 400px;
            position: relative;
        }

        .portfolios-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .portfolio-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .portfolio-header {
            margin-bottom: 1.5rem;
        }

        .portfolio-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 0.25rem 0;
            text-transform: capitalize;
        }

        .portfolio-desc {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.95rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 0.75rem 0;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td.number {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        th.number {
            text-align: right;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .error-message {
            background-color: rgba(248, 113, 113, 0.1);
            color: #f87171;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid rgba(248, 113, 113, 0.2);
            margin-bottom: 1rem;
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Oslo Børs Porteføljer</h1>
            <div id="last-updated" class="last-updated">Laster data...</div>
        </header>

        <div id="error-container" class="error-message"></div>
        <div id="loading-indicator" class="loading">Laster porteføljedata...</div>

        <div id="content" style="display: none;">
            <div id="summary-cards" class="summary-grid">
            </div>

            <div class="chart-container">
                <canvas id="performanceChart"></canvas>
            </div>

            <div id="portfolios-container" class="portfolios-section">
            </div>
        </div>
    </div>

    <script>
        const formatNOK = (value) => {
            return new Intl.NumberFormat('nb-NO', { 
                style: 'currency', 
                currency: 'NOK',
                maximumFractionDigits: 0
            }).format(value);
        };

        const formatPercent = (value) => {
            const formatted = new Intl.NumberFormat('nb-NO', { 
                style: 'percent',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
            return value > 0 ? '+' + formatted : formatted;
        };

        const formatDate = (dateString) => {
            return new Intl.DateTimeFormat('nb-NO', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }).format(new Date(dateString));
        };

        const colors = {
            mcap: '#4cc9f0',
            undervurdert: '#f72585',
            overvurdert: '#7209b7'
        };

        async function initDashboard() {
            try {
                // Hent data
                const BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                    ? '../data'
                    : 'https://raw.githubusercontent.com/slegga/investment-oslo/main/data';

                const [portefoljerRes, utviklingRes, posisjonerRes] = await Promise.all([
                    fetch(`${BASE}/portefolje.json`),
                    fetch(`${BASE}/portefoljeutvikling.json`),
                    fetch(`${BASE}/posisjon.json`)
                ]);

                if (!portefoljerRes.ok || !utviklingRes.ok || !posisjonerRes.ok) {
                    throw new Error('Kunne ikke laste en eller flere datafiler.');
                }

                const portefoljer = await portefoljerRes.json();
                const utvikling = await utviklingRes.json();
                const posisjoner = await posisjonerRes.json();

                // Prosesser data
                const portefoljeMap = new Map(portefoljer.map(p => [p.porteføljenavn, p]));
                
                // Grupper utvikling per portefølje
                const utviklingByPortefolje = {};
                const allDates = new Set();
                let latestDate = '1970-01-01';

                utvikling.forEach(row => {
                    if (!utviklingByPortefolje[row.porteføljenavn]) {
                        utviklingByPortefolje[row.porteføljenavn] = [];
                    }
                    utviklingByPortefolje[row.porteføljenavn].push(row);
                    allDates.add(row.kjopsdato);
                    if (row.kjopsdato > latestDate) {
                        latestDate = row.kjopsdato;
                    }
                });

                // Sorter datoer
                const sortedDates = Array.from(allDates).sort();

                // Oppdater sist oppdatert
                document.getElementById('last-updated').textContent = `Sist oppdatert: ${formatDate(latestDate)}`;

                // Skjul loading, vis innhold
                document.getElementById('loading-indicator').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                // Opprett summary cards
                const summaryContainer = document.getElementById('summary-cards');
                const pNames = ['mcap', 'undervurdert', 'overvurdert'];
                
                pNames.forEach(name => {
                    if (!utviklingByPortefolje[name] || utviklingByPortefolje[name].length === 0) return;
                    
                    const pData = utviklingByPortefolje[name].sort((a, b) => a.kjopsdato.localeCompare(b.kjopsdato));
                    const latest = pData[pData.length - 1];
                    const startValue = 100000;
                    const currentValue = latest.kjopssum;
                    const changePct = (currentValue - startValue) / startValue;
                    
                    const changeClass = changePct >= 0 ? 'change-positive' : 'change-negative';

                    summaryContainer.innerHTML += `
                        <div class="summary-card ${name}">
                            <h3 class="card-title">${name}</h3>
                            <p class="card-value">${formatNOK(currentValue)}</p>
                            <p class="card-change ${changeClass}">${formatPercent(changePct)}</p>
                        </div>
                    `;
                });

                // Tegn graf
                const ctx = document.getElementById('performanceChart').getContext('2d');
                
                const datasets = pNames.map(name => {
                    const pData = utviklingByPortefolje[name] || [];
                    pData.sort((a, b) => a.kjopsdato.localeCompare(b.kjopsdato));
                    
                    // Map values til sortedDates for å håndtere manglende dager
                    const dataPoints = sortedDates.map(date => {
                        const point = pData.find(d => d.kjopsdato === date);
                        return point ? point.kjopssum : null;
                    });

                    // Fyll inn manglende data med forrige kjente verdi
                    let lastValid = 100000;
                    const filledData = dataPoints.map(val => {
                        if (val !== null) {
                            lastValid = val;
                            return val;
                        }
                        return lastValid;
                    });

                    return {
                        label: name.charAt(0).toUpperCase() + name.slice(1),
                        data: filledData,
                        borderColor: colors[name],
                        backgroundColor: colors[name],
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        tension: 0.1
                    };
                });

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: sortedDates,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#e0e0e0',
                                    usePointStyle: true,
                                    boxWidth: 8
                                }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.parsed.y !== null) {
                                            label += formatNOK(context.parsed.y);
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: {
                                    color: '#2a2a4e',
                                    drawBorder: false
                                },
                                ticks: {
                                    color: '#a0a0a0',
                                    maxTicksLimit: 10
                                }
                            },
                            y: {
                                grid: {
                                    color: '#2a2a4e',
                                    drawBorder: false
                                },
                                ticks: {
                                    color: '#a0a0a0',
                                    callback: function(value) {
                                        return new Intl.NumberFormat('nb-NO').format(value) + ' kr';
                                    }
                                }
                            }
                        }
                    }
                });

                // Grupper og vis posisjoner for nyeste dato
                const latestPosDate = posisjoner.reduce((max, p) => p.kjopsdato > max ? p.kjopsdato : max, '1970-01-01');
                const currentPositions = posisjoner.filter(p => p.kjopsdato === latestPosDate);
                
                const posByPortefolje = {};
                currentPositions.forEach(p => {
                    if (!posByPortefolje[p.porteføljenavn]) {
                        posByPortefolje[p.porteføljenavn] = [];
                    }
                    posByPortefolje[p.porteføljenavn].push(p);
                });

                const portfoliosContainer = document.getElementById('portfolios-container');
                
                pNames.forEach(name => {
                    const positions = posByPortefolje[name] || [];
                    if (positions.length === 0) return;
                    
                    // Sorter synkende på investert
                    positions.sort((a, b) => b.investert - a.investert);
                    
                    const info = portefoljeMap.get(name) || { beskrivelse: '' };
                    
                    let tableHTML = `
                        <div class="portfolio-card">
                            <div class="portfolio-header">
                                <h2 class="portfolio-title" style="color: ${colors[name]}">${name}</h2>
                                <p class="portfolio-desc">${info.beskrivelse}</p>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Aksje</th>
                                        <th>Ticker</th>
                                        <th class="number">Investert</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    
                    positions.forEach(pos => {
                        tableHTML += `
                            <tr>
                                <td>${pos.navn}</td>
                                <td>${pos.ticker}</td>
                                <td class="number">${formatNOK(pos.investert)}</td>
                            </tr>
                        `;
                    });
                    
                    tableHTML += `
                                </tbody>
                            </table>
                        </div>
                    `;
                    
                    portfoliosContainer.innerHTML += tableHTML;
                });

            } catch (error) {
                console.error("Feil ved lasting av data:", error);
                const errorContainer = document.getElementById('error-container');
                errorContainer.textContent = `Feil: ${error.message} (Sørg for at datafilene eksisterer i ../data/ katalogen og serveres via en webserver, ikke direkte fra filsystemet)`;
                errorContainer.style.display = 'block';
                document.getElementById('loading-indicator').style.display = 'none';
            }
        }

        // Start initialisering når DOM er klar
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
